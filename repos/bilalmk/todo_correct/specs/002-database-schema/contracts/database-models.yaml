# Database Models Contract
# OpenAPI 3.1 Schema Definitions for SQLModel Models

openapi: 3.1.0
info:
  title: Todo Evolution - Database Models
  version: 1.0.0
  description: |
    SQLModel schema definitions for database tables.
    These models are used internally by the backend and exposed via API endpoints.

components:
  schemas:
    # ============================================================================
    # Task Model (13 fields)
    # ============================================================================
    Task:
      type: object
      required:
        - id
        - user_id
        - title
        - completed
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Auto-incrementing primary key (BIGSERIAL)
          readOnly: true
          example: 42
        user_id:
          type: integer
          format: int64
          description: Owner of the task (foreign key to users.id)
          example: 10
        title:
          type: string
          maxLength: 255
          minLength: 1
          description: Task title (required)
          example: "Buy groceries"
        description:
          type: string
          nullable: true
          maxLength: 10000
          description: Detailed description (optional)
          example: "Milk, eggs, bread, and vegetables"
        completed:
          type: boolean
          default: false
          description: Completion status
          example: false
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (UTC, TIMESTAMPTZ)
          readOnly: true
          example: "2025-12-29T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp (UTC, TIMESTAMPTZ)
          readOnly: true
          example: "2025-12-29T10:30:00Z"
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp (null = active)
          readOnly: true
          example: null
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
          description: Task priority (Phase V intermediate)
          example: "high"
        due_date:
          type: string
          format: date-time
          nullable: true
          description: Deadline timestamp (Phase V intermediate)
          example: "2025-12-30T17:00:00Z"
        reminder_at:
          type: string
          format: date-time
          nullable: true
          description: Reminder trigger time (Phase V advanced)
          example: "2025-12-30T16:30:00Z"
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly, custom]
          nullable: true
          description: Recurrence type (Phase V advanced)
          example: "weekly"
        recurrence_config:
          type: object
          nullable: true
          description: iCalendar RRULE format (Phase V advanced)
          example:
            rrule: "FREQ=WEEKLY;BYDAY=MO,FR"
            dtstart: "2025-01-01T09:00:00Z"

    # Create/Update DTOs
    TaskCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 255
          minLength: 1
        description:
          type: string
          nullable: true
          maxLength: 10000
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        reminder_at:
          type: string
          format: date-time
          nullable: true
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly, custom]
          nullable: true
        recurrence_config:
          type: object
          nullable: true

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          minLength: 1
        description:
          type: string
          nullable: true
          maxLength: 10000
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        reminder_at:
          type: string
          format: date-time
          nullable: true
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly, custom]
          nullable: true
        recurrence_config:
          type: object
          nullable: true

    # ============================================================================
    # Tag Model (5 fields)
    # ============================================================================
    Tag:
      type: object
      required:
        - id
        - user_id
        - name
        - color
        - created_at
      properties:
        id:
          type: integer
          format: int64
          description: Auto-incrementing primary key (BIGSERIAL)
          readOnly: true
          example: 5
        user_id:
          type: integer
          format: int64
          description: Owner of the tag (foreign key to users.id)
          example: 10
        name:
          type: string
          maxLength: 50
          minLength: 1
          description: Tag name (unique per user)
          example: "Work"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Hex color code
          example: "#FF5733"
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (UTC, TIMESTAMPTZ)
          readOnly: true
          example: "2025-12-29T10:00:00Z"
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp (null = active)
          readOnly: true
          example: null

    TagCreate:
      type: object
      required:
        - name
        - color
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 1
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"

    TagUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
          minLength: 1
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"

    # ============================================================================
    # TaskTag Model (Junction - 3 fields)
    # ============================================================================
    TaskTag:
      type: object
      required:
        - task_id
        - tag_id
        - created_at
      properties:
        task_id:
          type: integer
          format: int64
          description: Task reference (foreign key, primary key)
          example: 42
        tag_id:
          type: integer
          format: int64
          description: Tag reference (foreign key, primary key)
          example: 5
        created_at:
          type: string
          format: date-time
          description: When tag was assigned to task
          readOnly: true
          example: "2025-12-29T10:00:00Z"

    # ============================================================================
    # Notification Model (11 fields)
    # ============================================================================
    Notification:
      type: object
      required:
        - id
        - user_id
        - type
        - channel
        - recipient
        - subject
        - body
        - status
        - created_at
      properties:
        id:
          type: integer
          format: int64
          description: Auto-incrementing primary key (BIGSERIAL)
          readOnly: true
          example: 100
        user_id:
          type: integer
          format: int64
          description: Recipient user (foreign key to users.id)
          example: 10
        task_id:
          type: integer
          format: int64
          nullable: true
          description: Related task (null if task deleted)
          example: 42
        type:
          type: string
          enum: [reminder, recurring_created, overdue]
          description: Notification type
          example: "reminder"
        channel:
          type: string
          enum: [email, push, sms]
          description: Delivery channel
          example: "email"
        recipient:
          type: string
          maxLength: 255
          description: Email address or phone number
          example: "user@example.com"
        subject:
          type: string
          maxLength: 255
          description: Notification subject line
          example: "Reminder: Buy groceries"
        body:
          type: string
          maxLength: 10000
          description: Notification message content
          example: "Your task 'Buy groceries' is due at 5:00 PM today."
        sent_at:
          type: string
          format: date-time
          nullable: true
          description: When notification was delivered (null = pending)
          readOnly: true
          example: null
        status:
          type: string
          enum: [pending, sent, failed]
          default: pending
          description: Delivery status
          example: "pending"
        error_message:
          type: string
          nullable: true
          description: Error details if delivery failed
          readOnly: true
          example: null
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (UTC, TIMESTAMPTZ)
          readOnly: true
          example: "2025-12-29T10:00:00Z"

    NotificationCreate:
      type: object
      required:
        - type
        - channel
        - recipient
        - subject
        - body
      properties:
        task_id:
          type: integer
          format: int64
          nullable: true
        type:
          type: string
          enum: [reminder, recurring_created, overdue]
        channel:
          type: string
          enum: [email, push, sms]
        recipient:
          type: string
          maxLength: 255
        subject:
          type: string
          maxLength: 255
        body:
          type: string
          maxLength: 10000

    # ============================================================================
    # API Response Models
    # ============================================================================
    TaskWithTags:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            tags:
              type: array
              items:
                $ref: '#/components/schemas/Tag'
              description: Tags assigned to this task

    TaskListResponse:
      type: object
      required:
        - tasks
        - total
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskWithTags'
        total:
          type: integer
          description: Total count of tasks matching filters
          example: 150

    # ============================================================================
    # Error Responses
    # ============================================================================
    ErrorResponse:
      type: object
      required:
        - error
        - code
        - status
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Task not found"
        code:
          type: string
          description: Machine-readable error code
          example: "TASK_NOT_FOUND"
        status:
          type: integer
          description: HTTP status code
          example: 404
        request_id:
          type: string
          description: Unique request identifier for debugging
          example: "req_abc123xyz"
        details:
          type: object
          nullable: true
          description: Additional error context
          example:
            field: "title"
            reason: "Field is required"

  # ==============================================================================
  # Reusable Parameters
  # ==============================================================================
  parameters:
    UserIdPath:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: User ID (validated against JWT token)

    TaskIdPath:
      name: task_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Task ID

    TagIdPath:
      name: tag_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Tag ID

    CompletedQuery:
      name: completed
      in: query
      required: false
      schema:
        type: boolean
      description: Filter by completion status

    PriorityQuery:
      name: priority
      in: query
      required: false
      schema:
        type: string
        enum: [low, medium, high]
      description: Filter by priority

    TagQuery:
      name: tag_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
      description: Filter by tag ID

    SearchQuery:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Full-text search query

    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Maximum number of results

    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of results to skip

  # ==============================================================================
  # Security Schemes
  # ==============================================================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Better Auth

# ==============================================================================
# Global Security Requirement
# ==============================================================================
security:
  - BearerAuth: []
